  .day-date { font-size: 18px; font-weight: 700; color: #e2e8f0; line-height: 1; }

  .company-item:hover { background: #1e2840; }

  .status-badge { font-size: 9px; padding: 1px 5px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
  .badge-confirmed { background: #1e3a5f; color: #60a5fa; }
  .badge-expected { background: #3b2a0e; color: #fbbf24; }
  .badge-result { background: #0f3326; color: #34d399; }

  .day-col.today { border-color: #3b82f6; }
  .day-col.today .day-header { background: #172036; }
  .day-col.today .day-date { color: #60a5fa; }
  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
  .stat-card { background: #111520; border: 1px solid #1a2030; border-radius: 10px; padding: 12px 16px; }
  .stat-value { font-size: 26px; font-weight: 700; color: #f1f5f9; line-height: 1; }
  .stat-label { font-size: 11px; color: #475569; margin-top: 4px; }
  .stat-sub { font-size: 10px; color: #3b82f6; margin-top: 2px; }

  .upcoming-day-card.is-next .upcoming-day-header { background: #1c1408; }

const dateOrder = ['4/6','4/7','4/8','4/9','4/10','4/13','4/14','4/15','4/16','4/17',
  '4/20','4/21','4/22','4/23','4/24','4/27','4/28','4/29','4/30','5/1',
  '5/4','5/5','5/6','5/7','5/8','5/11','5/12','5/13','5/14','5/15'];

const TODAY = '4/29';
const todayIdx = dateOrder.indexOf(TODAY);

// 오늘 이후 날짜 중 기업이 있는 날짜 수집
function getUpcomingDays() {
  const allDays = [];
  calendarData.forEach(week => {
    week.days.forEach(day => {
      allDays.push(day);
    });
  });
  // 오늘 포함 이후, 기업 있는 날만, 가장 가까운 3일
  return allDays
    .filter(d => dateOrder.indexOf(d.date) >= todayIdx && d.companies.length > 0)
    .slice(0, 3);
}

let currentFilter = 'upcoming';
let highlightOnly = false;

function getStatusLabel(status) {
  if (status === 'result') return { label: '발표', cls: 'badge-result' };
  if (status === 'confirmed') return { label: '확정', cls: 'badge-confirmed' };
  if (status === 'new') return { label: '개별', cls: 'badge-expected' };
  return { label: '예정', cls: 'badge-expected' };
}

function getDayKorName(date) {
  const map = {'4/27':'월','4/28':'화','4/29':'수','4/30':'목','5/1':'금','5/4':'일','5/5':'화','5/6':'수','5/7':'목','5/8':'금','5/11':'일','5/12':'화','5/13':'수','5/14':'목','5/15':'금','4/6':'월','4/7':'화','4/8':'수','4/9':'목','4/10':'금','4/13':'월','4/14':'화','4/15':'수','4/16':'목','4/17':'금','4/20':'월','4/21':'화','4/22':'수','4/23':'목','4/24':'금'};
  return map[date] || '';
}

function renderUpcomingView(container) {
  const upcomingDays = getUpcomingDays();
  const view = document.createElement('div');
  view.className = 'upcoming-view';

  upcomingDays.forEach((day, idx) => {
    const card = document.createElement('div');
    card.className = 'upcoming-day-card' + (day.date === TODAY ? ' is-today' : idx === 1 ? ' is-next' : '');

    let tagLabel, tagCls;
    if (day.date === TODAY) { tagLabel = '오늘'; tagCls = 'tag-today'; }
    else if (idx === 1) { tagLabel = '내일 이후 첫 발표일'; tagCls = 'tag-next'; }
    else { tagLabel = `+${dateOrder.indexOf(day.date) - todayIdx}일 후`; tagCls = 'tag-upcoming'; }

    const filtered = highlightOnly ? day.companies.filter(c => c.highlight) : day.companies;

    card.innerHTML = `
      <div class="upcoming-day-header">
        <div class="upcoming-date-big">${day.date.split('/')[1]}일</div>
        <div class="upcoming-date-info">
          <span class="upcoming-date-label">${day.date} (${getDayKorName(day.date)})</span>
          <span class="upcoming-date-tag ${tagCls}">${tagLabel}</span>
        </div>
        <div class="upcoming-count-badge">${filtered.length}건 발표</div>
      </div>
      <div class="upcoming-companies">
        ${filtered.map(c => {
          const { label, cls } = getStatusLabel(c.status);
          return `<div class="upcoming-chip ${c.highlight ? 'highlight' : ''}" data-name="${c.name}">
            ${c.name}
            <span class="chip-badge ${cls}">${label}</span>
          </div>`;
        }).join('')}
      </div>
    `;
    card.querySelectorAll('.upcoming-chip').forEach(chip => {
      chip.onclick = () => openNaverSearch(chip.dataset.name);
    });
    view.appendChild(card);
  });

  container.appendChild(view);
}

function renderCalendar() {
  const container = document.getElementById('calendar-container');
  container.innerHTML = '';

  if (currentFilter === 'upcoming') {
    renderUpcomingView(container);
    updateStats();
    return;
  }

  let totalCount = 0, confirmedCount = 0;

  calendarData.forEach(week => {
    if (currentFilter !== 'all' && currentFilter !== week.id) return;
    const weekDiv = document.createElement('div');
    weekDiv.className = 'week-block';
    const label = document.createElement('div');
    label.className = 'week-label';
    label.textContent = week.label;
    weekDiv.appendChild(label);
    const grid = document.createElement('div');
    grid.className = 'days-grid';

    week.days.forEach(day => {
      const col = document.createElement('div');
      col.className = 'day-col' + (day.date === TODAY ? ' today' : '');
      const filtered = highlightOnly ? day.companies.filter(c => c.highlight) : day.companies;
      const header = document.createElement('div');
      header.className = 'day-header';
      header.innerHTML = `<span class="day-name">${day.name}</span><span class="day-date">${day.date.split('/')[1]}</span>${filtered.length > 0 ? `<span class="day-count">${filtered.length}건</span>` : ''}`;
      col.appendChild(header);
      if (filtered.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-day';
        empty.textContent = '—';
        col.appendChild(empty);
      } else {
        const list = document.createElement('div');
        list.className = 'company-list';
        filtered.forEach(c => {
          totalCount++;
          if (c.status === 'confirmed') confirmedCount++;
          const { label, cls } = getStatusLabel(c.status);
          const item = document.createElement('div');
          item.className = 'company-item' + (c.highlight ? ' highlight' : '');
          item.innerHTML = `<span class="company-name">${c.name}</span><span class="status-badge ${cls}">${label}</span>`;
          item.onclick = () => openNaverSearch(c.name);
          list.appendChild(item);
        });
        col.appendChild(list);
      }
      grid.appendChild(col);
    });

    weekDiv.appendChild(grid);
    container.appendChild(weekDiv);
  });

  updateStats();
}

function updateStats() {
  let total = 0, confirmed = 0, remaining = 0;
  calendarData.forEach(w => w.days.forEach(d => {
    d.companies.forEach(c => {
      total++;
      if (c.status === 'confirmed') confirmed++;
      if (dateOrder.indexOf(d.date) >= todayIdx) remaining++;
    });
  }));
  document.getElementById('total-count').textContent = total;
  document.getElementById('confirmed-count').textContent = confirmed;
  document.getElementById('remaining-count').textContent = remaining;
}

function openNaverSearch(name) {
  window.open('https://search.naver.com/search.naver?query=' + encodeURIComponent(name), '_blank');
}

function filterWeek(id, btn) {
  currentFilter = id;
  highlightOnly = false;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCalendar();
}

function filterHighlight(btn) {
  highlightOnly = !highlightOnly;
  btn.classList.toggle('active', highlightOnly);
  renderCalendar();
}

renderCalendar();
</script>
<script>
  // Service Worker 등록
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .catch(e => console.log('SW error:', e));
    });
  }
  // iOS 감지 → 배너 표시
  const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true;
  if (isIos && !isStandalone && !sessionStorage.getItem('b')) {
    document.getElementById('iosBanner').classList.add('show');
  }
</script>
